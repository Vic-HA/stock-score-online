name: Phase D Refresh History Cache

on:
  workflow_dispatch:
    inputs:
      max_symbols:
        description: "Max symbols to refresh in this run"
        required: false
        default: "50"
        type: string
      symbols:
        description: "Optional comma-separated symbols to refresh/add, for example: 2406 or 2406,2330,0050"
        required: false
        default: ""
        type: string
      force:
        description: "Force refresh even if cache is fresh"
        required: false
        default: true
        type: boolean
  # GitHub schedule uses UTC and only runs from the repository default branch.
  # Taiwan time examples:
  #   15:40 Asia/Taipei = 07:40 UTC
  #   18:10 Asia/Taipei = 10:10 UTC
  #   22:10 Asia/Taipei = 14:10 UTC
  schedule:
    - cron: "40 7 * * 1-5"
    - cron: "10 10 * * 1-5"
    - cron: "10 14 * * 1-5"
permissions:
  contents: write

concurrency:
  group: phase-d-history-cache-refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh-history-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start Next.js server
        shell: bash
        run: |
          npm run start -- -H 127.0.0.1 -p 3000 > /tmp/phase-d-next.log 2>&1 &
          echo $! > /tmp/phase-d-next.pid
          npx --yes wait-on http://127.0.0.1:3000/ --timeout 90000

      - name: Refresh Phase D history cache
        shell: bash
        run: |
          MAX_SYMBOLS="${{ inputs.max_symbols || '50' }}"
          SYMBOLS="${{ inputs.symbols || '' }}"
          FORCE_FLAG=""
          SYMBOLS_FLAG=""
          MODE="auto"
          if [ "${{ inputs.force || true }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          if [ -n "$SYMBOLS" ]; then
            SYMBOLS_FLAG="--symbols=$SYMBOLS"
            MODE="refresh"
          fi

          node scripts/phase-d-refresh-history-cache.mjs \
            --mode="$MODE" \
            $FORCE_FLAG \
            $SYMBOLS_FLAG \
            --autoMaxSymbols="$MAX_SYMBOLS" \
            --baseUrl=http://127.0.0.1:3000

      - name: Verify Phase D history cache
        shell: bash
        run: |
          SYMBOLS="${{ inputs.symbols || '' }}"
          SYMBOLS_FLAG=""
          if [ -n "$SYMBOLS" ]; then
            SYMBOLS_FLAG="--symbols=$SYMBOLS"
          fi
          node scripts/phase-d-refresh-history-cache.mjs --mode=verify --dryRun $SYMBOLS_FLAG --baseUrl=http://127.0.0.1:3000

      - name: Stop Next.js server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/phase-d-next.pid ]; then
            kill "$(cat /tmp/phase-d-next.pid)" || true
          fi
          if [ -f /tmp/phase-d-next.log ]; then
            echo "--- Next.js server log tail ---"
            tail -80 /tmp/phase-d-next.log || true
          fi

      - name: Commit cache updates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/history-cache/status.json \
            data/history-cache/symbol-registry.json \
            data/history-cache/stocks/*.json \
            data/twse-history-snapshot.json

          if git diff --cached --quiet; then
            echo "No Phase D history cache changes to commit."
          else
            COMMIT_DATE=$(node -e "try{const s=require('./data/twse-history-snapshot.json'); console.log((s.sourceLatestDate||new Date().toISOString()).slice(0,10))}catch(e){console.log(new Date().toISOString().slice(0,10))}")
            git commit -m "Phase D refresh history cache ${COMMIT_DATE}"
            git push
          fi
